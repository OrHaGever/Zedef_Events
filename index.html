<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ניהול אירועים</title>

<style>
body {font-family:Arial;background:#f6f3ee;margin:0;padding:20px}
h1 {text-align:center}
section {background:#fff;padding:15px;margin-bottom:20px;border-radius:12px}
input,select,button,textarea {margin:5px;padding:8px;border-radius:8px;border:1px solid #ccc}
table {width:100%;margin-top:10px;border-collapse:collapse}
td,th {border-bottom:1px solid #eee;padding:8px;text-align:right}
button {background:#9a622e;color:white;border:none;cursor:pointer}
</style>
</head>

<body>

<h1>מערכת ניהול אירועים</h1>

<section>
<h2>הוספת אירוע</h2>
<form id="eventForm">
<input id="name" placeholder="שם לקוח">
<input id="phone" placeholder="טלפון">
<input id="date" type="date">
<input id="guests" type="number" placeholder="אורחים">
<textarea id="notes" placeholder="הערות"></textarea>
<button>שמור</button>
</form>
</section>

<section>
<h2>אירועים</h2>
<input id="search" placeholder="חיפוש...">
<table id="events"></table>
</section>

<section>
<h2>בקשות תפריט</h2>
<form id="menuForm">
<input id="mname" placeholder="שם לקוח">
<input id="mdate" type="date">
<textarea id="mdetails" placeholder="תפריט"></textarea>
<button>הוסף</button>
</form>

<table id="menus"></table>
</section>

<script>
let events = JSON.parse(localStorage.getItem("events")||"[]");
let menus = JSON.parse(localStorage.getItem("menus")||"[]");

function save(){
localStorage.setItem("events",JSON.stringify(events));
localStorage.setItem("menus",JSON.stringify(menus));
}

eventForm.onsubmit=e=>{
e.preventDefault();
events.push({
id:Date.now(),
name:name.value,
phone:phone.value,
date:date.value,
guests:guests.value,
notes:notes.value
});
save(); render(); eventForm.reset();
}

menuForm.onsubmit=e=>{
e.preventDefault();
menus.push({
id:Date.now(),
name:mname.value,
date:mdate.value,
details:mdetails.value
});
save(); render(); menuForm.reset();
}

function delEvent(id){
events=events.filter(e=>e.id!=id);
save(); render();
}

function delMenu(id){
menus=menus.filter(e=>e.id!=id);
save(); render();
}

function render(){
let s=search.value?.toLowerCase()||"";

eventsTable.innerHTML=events
.filter(e=>JSON.stringify(e).toLowerCase().includes(s))
.sort((a,b)=>new Date(a.date)-new Date(b.date))
.map(e=>`
<tr>
<td>${e.date}</td>
<td>${e.name}</td>
<td>${e.guests}</td>
<td>${e.notes||""}</td>
<td><button onclick="delEvent(${e.id})">מחק</button></td>
</tr>`).join("");

menusTable.innerHTML=menus.map(m=>`
<tr>
<td>${m.date}</td>
<td>${m.name}</td>
<td>${m.details}</td>
<td><button onclick="delMenu(${m.id})">מחק</button></td>
</tr>`).join("");
}

search.oninput=render;

render();
</script>

</body>
</html>
